<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>FAXデスク｜林材木店</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232563eb'/%3E%3Ctext x='50' y='74' font-size='64' text-anchor='middle' fill='%23fff' font-family='sans-serif' font-weight='bold'%3Eフ%3C/text%3E%3C/svg%3E">
<script src="./pdf.min.js"></script>
<style>
:root{
  --bg:#f4f6f9; --card:#fff; --ink:#1c2733; --sub:#68788c; --line:#e3e9f0;
  --blue:#2563eb; --blue-soft:#eaf1fe; --red:#dc2626; --red-soft:#fdecec;
  --orange:#d97706; --orange-soft:#fdf3e2; --green:#16a34a; --green-soft:#e8f7ee;
  --gray-soft:#eef1f5;
}
*{box-sizing:border-box; margin:0; padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.6}
header{background:#fff; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:50}
.hwrap{max-width:1080px; margin:0 auto; padding:10px 16px; display:flex; align-items:center; gap:10px}
.logo{font-size:18px; font-weight:800}
.logo small{font-weight:600; color:var(--sub); margin-left:6px; font-size:12px}
.hsp{flex:1}
.iconbtn{border:1px solid var(--line); background:#fff; border-radius:8px; padding:6px 12px; cursor:pointer; font-size:13px; color:var(--sub)}
.iconbtn:hover{background:var(--gray-soft)}
main{max-width:1080px; margin:0 auto; padding:14px 16px 90px}
.tabs{display:flex; gap:6px; margin-bottom:14px}
.tab{flex:1; text-align:center; padding:10px 4px; border-radius:10px; border:1px solid var(--line);
  background:#fff; cursor:pointer; font-weight:700; font-size:14px; color:var(--sub); position:relative}
.tab.on{background:var(--blue); border-color:var(--blue); color:#fff}
.tab .badge{position:absolute; top:-6px; right:-2px; background:var(--red); color:#fff; font-size:11px;
  border-radius:999px; min-width:18px; padding:1px 5px; display:none}
.card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:12px}
.lbl{display:block; font-size:13px; font-weight:700; color:var(--sub); margin:12px 0 4px}
.lbl:first-child{margin-top:0}
.txt, textarea, select{width:100%; border:1px solid var(--line); border-radius:8px; padding:10px 12px;
  font-size:15px; font-family:inherit; background:#fff; color:var(--ink)}
.txt:focus, textarea:focus{outline:2px solid var(--blue-soft); border-color:var(--blue)}
textarea{resize:vertical; min-height:130px}
.hint{font-size:12px; color:var(--sub); margin-top:4px}
.btn{display:inline-block; border:none; border-radius:10px; padding:12px 22px; font-size:15px; font-weight:800;
  cursor:pointer; background:var(--blue); color:#fff}
.btn:disabled{opacity:.45; cursor:default}
.btn.sub{background:#fff; color:var(--ink); border:1px solid var(--line); font-weight:600}
.row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
/* 送信モード切替 */
.seg{display:flex; gap:0; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:14px}
.seg div{flex:1; text-align:center; padding:9px 6px; cursor:pointer; font-weight:700; font-size:14px; color:var(--sub); background:#fff}
.seg div.on{background:var(--ink); color:#fff}
/* 取引先コンボ */
.combo{position:relative}
.combo-list{position:absolute; left:0; right:0; top:calc(100% + 4px); background:#fff; border:1px solid var(--line);
  border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.12); max-height:280px; overflow:auto; z-index:40; display:none}
.combo-item{padding:10px 14px; cursor:pointer; display:flex; justify-content:space-between; gap:8px; font-size:14px}
.combo-item:hover{background:var(--blue-soft)}
.combo-item .num{color:var(--sub); font-size:13px; white-space:nowrap}
.chip{display:inline-flex; align-items:center; gap:8px; background:var(--blue-soft); border:1px solid #c7dbfc;
  border-radius:999px; padding:6px 14px; font-weight:700; font-size:14px}
.chip .x{cursor:pointer; color:var(--sub); font-weight:400}
.dest-preview{font-size:13px; color:var(--sub); margin-top:6px}
.dest-preview b{color:var(--ink)}
/* 一括送信 */
.gchips{display:flex; gap:6px; flex-wrap:wrap}
.gchip{border:1px solid var(--line); background:#fff; border-radius:999px; padding:6px 15px; font-size:13.5px; cursor:pointer; color:var(--sub); font-weight:700}
.gchip.on{background:var(--blue); color:#fff; border-color:var(--blue)}
.targets{border:1px solid var(--line); border-radius:10px; max-height:270px; overflow:auto; margin-top:10px}
.trow{display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:1px solid var(--line); font-size:14px; cursor:pointer}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--gray-soft)}
.trow input{width:17px; height:17px; accent-color:var(--blue)}
.trow .num{color:var(--sub); font-size:12.5px; margin-left:auto; white-space:nowrap}
/* 添付 */
.filelist{margin-top:8px; display:flex; flex-direction:column; gap:6px}
.fileitem{display:flex; align-items:center; gap:8px; background:var(--gray-soft); border-radius:8px; padding:8px 12px; font-size:13px}
.fileitem .nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.fileitem .rm{cursor:pointer; color:var(--red); font-weight:700; padding:0 4px}
/* フィルタ */
.filters{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px}
.fchip{border:1px solid var(--line); background:#fff; border-radius:999px; padding:5px 14px; font-size:13px; cursor:pointer; color:var(--sub); font-weight:600}
.fchip.on{background:var(--ink); color:#fff; border-color:var(--ink)}
/* サムネイルグリッド */
.grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(185px, 1fr)); gap:12px}
.gcard{background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden; display:flex; flex-direction:column}
.gthumb{position:relative; aspect-ratio:210/272; background:#fbfcfe; cursor:pointer; overflow:hidden; border-bottom:1px solid var(--line)}
.gthumb canvas, .gthumb img{width:100%; height:100%; object-fit:cover; object-position:top; display:block}
.gthumb .ph{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--sub); font-size:12.5px; padding:12px; text-align:center}
.gthumb .ph .big{font-size:40px}
.gthumb:hover{outline:3px solid var(--blue-soft)}
.gpill{position:absolute; top:8px; left:8px; z-index:2}
.gpages{position:absolute; bottom:8px; right:8px; background:rgba(28,39,51,.75); color:#fff; font-size:11px; border-radius:6px; padding:1px 7px; z-index:2}
.ginfo{padding:9px 11px 10px; display:flex; flex-direction:column; gap:4px}
.gvendor{font-weight:800; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.gmeta{color:var(--sub); font-size:11.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.gsub{font-size:12px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.gact{display:flex; gap:6px; margin-top:3px}
.gact select{padding:4px 6px; font-size:12px; border-radius:7px; flex:1; min-width:0}
.gact .abtn{padding:4px 9px; font-size:12px}
.pill{border-radius:999px; padding:3px 12px; font-size:12px; font-weight:800; white-space:nowrap}
.p-red{background:var(--red-soft); color:var(--red)}
.p-orange{background:var(--orange-soft); color:var(--orange)}
.p-blue{background:var(--blue-soft); color:var(--blue)}
.p-green{background:var(--green-soft); color:var(--green)}
.p-gray{background:var(--gray-soft); color:var(--sub)}
.abtn{border:1px solid var(--line); background:#fff; border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; font-weight:600}
.abtn:hover{background:var(--gray-soft)}
.abtn.primary{background:var(--blue); border-color:var(--blue); color:#fff}
.empty{text-align:center; color:var(--sub); padding:36px 10px; font-size:14px}
/* モーダル */
.overlay{position:fixed; inset:0; background:rgba(15,23,42,.5); display:none; align-items:center; justify-content:center; z-index:100; padding:16px}
.overlay.show{display:flex}
.modal{background:#fff; border-radius:14px; padding:22px; width:100%; max-width:480px; max-height:90vh; overflow:auto}
.modal h3{font-size:17px; margin-bottom:12px}
.kv{display:grid; grid-template-columns:78px 1fr; gap:6px 10px; font-size:14px; margin-bottom:14px}
.kv .k{color:var(--sub); font-weight:700; font-size:13px}
.warn{background:var(--orange-soft); color:var(--orange); border-radius:8px; padding:8px 12px; font-size:13px; font-weight:600; margin-bottom:14px}
/* ビューア（拡大表示） */
#viewer{position:fixed; inset:0; background:rgba(15,23,42,.88); z-index:120; display:none; flex-direction:column}
#viewer.show{display:flex}
.v-head{display:flex; align-items:center; gap:10px; padding:10px 16px; color:#fff; flex-wrap:wrap}
.v-head .t{font-weight:800; font-size:15px}
.v-head .m{color:#b9c4d4; font-size:12.5px}
.v-close{margin-left:auto; background:rgba(255,255,255,.12); border:none; color:#fff; font-size:15px; border-radius:8px; padding:7px 16px; cursor:pointer; font-weight:700}
.v-body{flex:1; overflow:auto; padding:6px 16px 16px; -webkit-overflow-scrolling:touch}
.v-pages{max-width:880px; margin:0 auto; display:flex; flex-direction:column; gap:12px}
.v-pages canvas, .v-pages img{width:100%; background:#fff; border-radius:6px; box-shadow:0 4px 20px rgba(0,0,0,.4); display:block}
.v-note{color:#b9c4d4; text-align:center; padding:30px 10px; font-size:14px}
.v-detail{background:#fff; border-radius:10px; padding:18px; font-size:14px}
.v-detail .kv{margin-bottom:0}
.v-foot{background:#101825; padding:10px 16px calc(10px + env(safe-area-inset-bottom))}
.v-foot-in{max-width:880px; margin:0 auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
.v-foot select{width:auto; padding:7px 10px; font-size:13px; border-radius:8px}
.v-foot .memoinput{flex:1; min-width:130px; border:1px solid #33415a; background:#182337; color:#fff; border-radius:8px; padding:7px 10px; font-size:13px; font-family:inherit}
.v-foot .memoinput::placeholder{color:#7b8aa3}
/* トースト */
#toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
  border-radius:10px; padding:10px 20px; font-size:14px; font-weight:600; opacity:0; transition:opacity .25s; z-index:300; pointer-events:none; max-width:90vw}
#toast.show{opacity:1}
/* ログイン */
#gate{position:fixed; inset:0; background:var(--bg); z-index:150; display:flex; align-items:center; justify-content:center; padding:16px}
.gatebox{background:#fff; border:1px solid var(--line); border-radius:14px; padding:28px; width:100%; max-width:360px}
.gatebox h2{font-size:19px; margin-bottom:4px}
.gatebox p{color:var(--sub); font-size:13px; margin-bottom:16px}
.hidden{display:none !important}
.spin{display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:sp 1s linear infinite; vertical-align:-2px; margin-right:6px}
.spin.dark{border-color:var(--sub); border-top-color:transparent}
@keyframes sp{to{transform:rotate(360deg)}}
/* ジャンル管理 */
.glist{border:1px solid var(--line); border-radius:10px; max-height:380px; overflow:auto; margin-top:10px}
.grow{display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--line); font-size:13.5px}
.grow:last-child{border-bottom:none}
.grow .nm{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.grow .num{color:var(--sub); font-size:11.5px; white-space:nowrap}
.grow select{width:110px; padding:5px 6px; font-size:12.5px}
@media(max-width:560px){
  .kv{grid-template-columns:70px 1fr} main{padding:10px 10px 90px}
  .grid{grid-template-columns:repeat(2, 1fr); gap:8px}
}
</style>
</head>
<body>

<div id="gate">
  <div class="gatebox">
    <h2>📠 FAXデスク</h2>
    <p>林材木店 eFax送受信ツール</p>
    <label class="lbl">メールアドレス</label>
    <input class="txt" id="g-email" type="email" autocomplete="username">
    <label class="lbl">パスワード</label>
    <input class="txt" id="g-pass" type="password" autocomplete="current-password">
    <div style="margin-top:16px"><button class="btn" id="g-btn" style="width:100%">ログイン</button></div>
    <div class="hint" id="g-msg" style="margin-top:8px"></div>
  </div>
</div>

<header>
  <div class="hwrap">
    <div class="logo">📠 FAXデスク<small>林材木店</small></div>
    <div class="hsp"></div>
    <button class="iconbtn" id="btn-refresh">🔄 更新</button>
    <button class="iconbtn" id="btn-logout">ログアウト</button>
  </div>
</header>

<main>
  <div class="tabs">
    <div class="tab on" data-tab="send">📤 送信</div>
    <div class="tab" data-tab="inbox">📥 受信FAX<span class="badge" id="inbox-badge"></span></div>
    <div class="tab" data-tab="history">📜 送信履歴</div>
  </div>

  <!-- ============ 送信 ============ -->
  <section id="tab-send">
    <div class="seg">
      <div class="on" data-mode="single">✉️ 1件ずつ送る</div>
      <div data-mode="bulk">📢 一括送信（ジャンル）</div>
    </div>

    <div class="card">
      <!-- 個別宛先 -->
      <div id="dest-single">
        <label class="lbl">宛先（取引先から選ぶ）</label>
        <div class="combo" id="combo">
          <input class="txt" id="c-search" placeholder="取引先名で検索…（例: ナイス）" autocomplete="off">
          <div class="combo-list" id="c-list"></div>
        </div>
        <div id="c-selected" style="margin-top:8px" class="hidden">
          <span class="chip"><span id="c-name"></span><span id="c-num" style="font-weight:400"></span><span class="x" id="c-clear">✕</span></span>
        </div>
        <label class="lbl">または FAX番号を直接入力</label>
        <input class="txt" id="s-manual" placeholder="例: 0538-42-1138" inputmode="tel">
        <div class="dest-preview" id="dest-preview"></div>
      </div>

      <!-- 一括宛先 -->
      <div id="dest-bulk" class="hidden">
        <div class="row" style="justify-content:space-between">
          <label class="lbl" style="margin:0">ジャンルを選ぶ → 宛先を確認</label>
          <button class="abtn" id="btn-genre-mng">🏷️ ジャンル管理</button>
        </div>
        <div class="gchips" id="genre-chips" style="margin-top:8px"></div>
        <div class="row" style="margin-top:10px; justify-content:space-between">
          <span class="hint" id="bulk-count" style="margin:0">宛先 0件</span>
          <span>
            <button class="abtn" id="bulk-all">全選択</button>
            <button class="abtn" id="bulk-none">全解除</button>
          </span>
        </div>
        <div class="targets" id="target-list"><div class="empty">ジャンルを選択してください</div></div>
      </div>

      <label class="lbl">件名（送付状のタイトルになります）</label>
      <input class="txt" id="s-subject" placeholder="例:【林材木店】お見積りの件">
      <label class="lbl">本文（送付状に印字されます）</label>
      <textarea id="s-body" placeholder="いつもお世話になっております。&#10;株式会社林材木店です。&#10;&#10;（ここに書いた文章がFAX1枚目の送付状になります）"></textarea>

      <label class="lbl">添付ファイル（PDF・Word・Excel・画像／これがFAX原稿になります）</label>
      <input type="file" id="s-files" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.gif,.tif,.tiff">
      <div class="filelist" id="filelist"></div>
      <div class="hint">添付なしの場合は送付状（件名＋本文）1枚だけが送信されます。合計18MBまで。</div>

      <div style="margin-top:18px" class="row">
        <button class="btn" id="btn-send">📠 FAXを送信する</button>
        <button class="btn sub" id="btn-clear">クリア</button>
        <span class="hsp"></span>
        <button class="abtn" id="btn-addcontact">＋取引先を登録</button>
      </div>
    </div>
  </section>

  <!-- ============ 受信 ============ -->
  <section id="tab-inbox" class="hidden">
    <div class="filters" id="inbox-filters"></div>
    <div id="inbox-list"><div class="empty">読み込み中…</div></div>
  </section>

  <!-- ============ 履歴 ============ -->
  <section id="tab-history" class="hidden">
    <div id="history-list"><div class="empty">読み込み中…</div></div>
  </section>
</main>

<!-- 拡大ビューア -->
<div id="viewer">
  <div class="v-head">
    <span class="t" id="v-title"></span>
    <span class="m" id="v-meta"></span>
    <button class="v-close" id="v-close">✕ 閉じる</button>
  </div>
  <div class="v-body"><div class="v-pages" id="v-pages"></div></div>
  <div class="v-foot"><div class="v-foot-in" id="v-foot"></div></div>
</div>

<!-- 送信確認モーダル -->
<div class="overlay" id="confirm-ov">
  <div class="modal">
    <h3 id="cf-title">この内容でFAXを送信しますか？</h3>
    <div class="kv">
      <span class="k">宛先</span><span id="cf-vendor" style="max-height:130px; overflow:auto"></span>
      <span class="k">件名</span><span id="cf-subject"></span>
      <span class="k">本文</span><span id="cf-body" style="white-space:pre-wrap; max-height:110px; overflow:auto"></span>
      <span class="k">添付</span><span id="cf-files"></span>
    </div>
    <div class="warn">⚠️ 送信後の取り消しはできません。宛先をご確認ください。</div>
    <div class="row" style="justify-content:flex-end">
      <button class="btn sub" id="cf-cancel">やめる</button>
      <button class="btn" id="cf-ok">送信する</button>
    </div>
  </div>
</div>

<!-- 取引先追加モーダル -->
<div class="overlay" id="contact-ov">
  <div class="modal">
    <h3>取引先を登録</h3>
    <label class="lbl">取引先名</label>
    <input class="txt" id="nc-name" placeholder="例: 株式会社〇〇">
    <label class="lbl">FAX番号</label>
    <input class="txt" id="nc-num" placeholder="例: 053-421-0000" inputmode="tel">
    <label class="lbl">ジャンル</label>
    <select id="nc-genre"></select>
    <div class="hint">FAX台帳（取引先マスタ）に登録され、受信FAXの自動仕分けにも反映されます。</div>
    <div class="row" style="justify-content:flex-end; margin-top:16px">
      <button class="btn sub" id="nc-cancel">やめる</button>
      <button class="btn" id="nc-ok">登録</button>
    </div>
  </div>
</div>

<!-- ジャンル管理モーダル -->
<div class="overlay" id="genre-ov">
  <div class="modal" style="max-width:560px">
    <h3>🏷️ 取引先のジャンル管理</h3>
    <input class="txt" id="gm-search" placeholder="取引先名で絞り込み…">
    <div class="glist" id="gm-list"></div>
    <div class="row" style="justify-content:flex-end; margin-top:14px">
      <button class="btn sub" id="gm-close">閉じる</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ==== 設定 ==== */
const API_URL = "https://script.google.com/macros/s/AKfycbxQCf2HVfLjUAzOYXJHzzhquN3zkNrUAgcusg3mH5uhlm-UySsDYXBChhLjZGI2DyecIg/exec";
const LSK = 'faxdesk_cred';
const GENRES = ['市場','仕入先','運送','組合','その他'];

if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.min.js';

let CRED = null;
try { CRED = JSON.parse(localStorage.getItem(LSK) || 'null'); } catch(_){}

let CONTACTS = [];      // {num, num81, name, addr, genre}
let INBOX = [];
let SENT = [];
let selContact = null;
let attach = [];
let inboxFilter = '未対応';
let sendMode = 'single';
let bulkGenre = '';
let bulkChecked = new Set();   // num81

const $ = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg, ms=2600){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'), ms); }

/* ==== API ==== */
async function apiGet(action, params={}){
  const u = new URL(API_URL);
  u.searchParams.set('action', action);
  u.searchParams.set('email', CRED.email);
  u.searchParams.set('pass', CRED.pass);
  for(const [k,v] of Object.entries(params)) u.searchParams.set(k, v);
  const res = await fetch(u.toString());
  return res.json();
}

function fmtNum(n){
  n = String(n||'').replace(/[^\d]/g,'');
  if(n.startsWith('81') && n.length>=11) n = '0'+n.slice(2);
  return n;
}
function to81(n){ n=String(n||'').replace(/[^\d]/g,''); if(!n) return ''; if(n.startsWith('81')&&n.length>=11) return n; if(n.startsWith('0')) return '81'+n.slice(1); return ''; }
function fmtDate(iso){
  const d = new Date(iso);
  if(isNaN(d)) return String(iso||'');
  const wd = '日月火水木金土'[d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${wd}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function vendorOf(num){ const c = CONTACTS.find(x=>x.num===fmtNum(num)); return c ? c.name : ''; }

/* ==== PDFサムネイル・キャッシュ ==== */
const pdfCache = new Map();        // id -> files[]（セッション内）
const thumbQueue = [];
let thumbRunning = 0;

/* サムネイルの端末永続キャッシュ（IndexedDB）— 2回目以降は瞬時に表示 */
let IDB = null;
(function(){
  try{
    const q = indexedDB.open('faxdesk', 1);
    q.onupgradeneeded = ()=>q.result.createObjectStore('thumbs');
    q.onsuccess = ()=>{ IDB = q.result; };
  }catch(_){}
})();
function thumbGet(id){
  return new Promise(res=>{
    if(!IDB) return res(null);
    try{
      const t = IDB.transaction('thumbs').objectStore('thumbs').get(id);
      t.onsuccess = ()=>res(t.result || null);
      t.onerror = ()=>res(null);
    }catch(_){ res(null); }
  });
}
function thumbSet(id, dataUrl){
  if(!IDB) return;
  try{ IDB.transaction('thumbs','readwrite').objectStore('thumbs').put(dataUrl, id); }catch(_){}
}
async function getFaxFiles(id){
  if(pdfCache.has(id)) return pdfCache.get(id);
  const r = await apiGet('pdf', {id});
  if(!r.ok) throw new Error(r.error||'取得失敗');
  pdfCache.set(id, r.files);
  return r.files;
}
function b64ToBytes(b64){ const bin = atob(b64); const u = new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }
async function renderPdfPage(bytes, canvas, targetWidth, pageNo=1){
  const pdf = await pdfjsLib.getDocument({data: bytes.slice()}).promise;
  const page = await pdf.getPage(pageNo);
  const vp1 = page.getViewport({scale:1});
  const scale = targetWidth / vp1.width;
  const vp = page.getViewport({scale});
  canvas.width = vp.width; canvas.height = vp.height;
  // intent:'print' = rAF非依存（バックグラウンドのタブ/ウィンドウでも描画が進む）
  await page.render({canvasContext: canvas.getContext('2d'), viewport: vp, intent: 'print'}).promise;
  return pdf.numPages;
}
function queueThumb(id, holder, overlays){
  thumbQueue.push({id, holder, overlays: overlays||[]});
  pumpThumbs();
}
async function pumpThumbs(){
  while(thumbRunning < 5 && thumbQueue.length){
    const job = thumbQueue.shift();
    if(!document.body.contains(job.holder)) continue;
    thumbRunning++;
    (async ()=>{
      try{
        // 端末キャッシュにあれば即表示（通信なし）
        const cached = await thumbGet(job.id);
        if(cached){
          if(!document.body.contains(job.holder)) return;
          job.holder.innerHTML = '';
          const img = document.createElement('img');
          img.src = cached;
          job.holder.appendChild(img);
          (job.overlays||[]).forEach(o=>job.holder.appendChild(o));
          return;
        }
        const files = await getFaxFiles(job.id);
        if(!document.body.contains(job.holder)) return;
        const f = files[0];
        job.holder.innerHTML = '';
        if(/^image\//.test(f.mime)){
          const img = document.createElement('img');
          const du = `data:${f.mime};base64,${f.data}`;
          img.src = du;
          job.holder.appendChild(img);
          if(du.length < 400000) thumbSet(job.id, du);
        } else {
          const cv = document.createElement('canvas');
          job.holder.appendChild(cv);
          await renderPdfPage(b64ToBytes(f.data), cv, 420);
          try{ thumbSet(job.id, cv.toDataURL('image/jpeg', 0.72)); }catch(_){}
        }
        (job.overlays||[]).forEach(o=>job.holder.appendChild(o));
      }catch(err){
        job.holder.innerHTML = `<div class="ph"><span class="big">📄</span><span>プレビュー取得不可</span></div>`;
        (job.overlays||[]).forEach(o=>job.holder.appendChild(o));
      }finally{
        thumbRunning--;
        pumpThumbs();
      }
    })();
  }
}
const thumbObserver = new IntersectionObserver(entries=>{
  for(const e of entries){
    if(e.isIntersecting){
      const el = e.target;
      thumbObserver.unobserve(el);
      const overlays = [...el.querySelectorAll('.gpill,.gpages')];
      queueThumb(el.dataset.pdf, el, overlays);
    }
  }
}, {rootMargin: '200px'});

      pages.innerHTML = '';
      const w = Math.min(880, window.innerWidth - 32) * Math.min(2, window.devicePixelRatio||1);
      for(const f of files){
        if(/^image\//.test(f.mime)){
          const img = document.createElement('img');

          pages.appendChild(img);

          for(let p=1; p<=pdf.numPages; p++){
            const page = await pdf.getPage(p);

            pages.appendChild(cv);
            await page.render({canvasContext: cv.getContext('2d'), viewport: vp, intent: 'print'}).promise;
          }
        }
      }

      pages.innerHTML = `<div class="v-note">読み込みに失敗しました: ${esc(err.message||err)}</div>`;

async function downloadFax(id, label){
  try{
    const files = await getFaxFiles(id);

      const a = document.createElement('a');
      a.href = url; a.download = f.name || `${label}_${i+1}.pdf`;
      a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 30000);

  }catch(err){ toast('ダウンロード失敗: '+err); }
}

};
function clearForm(){
  selContact = null; $('#c-selected').classList.add('hidden');
  $('#s-manual').value=''; $('#s-subject').value=''; $('#s-body').value='';
  attach = []; renderFiles(); updateDestPreview();
  bulkChecked.clear(); if(sendMode==='bulk') renderTargets();
}
$('#btn-clear').onclick = clearForm;

function prefillReply(item){
  sendMode='single';
  document.querySelectorAll('.seg div').forEach(x=>x.classList.toggle('on', x.dataset.mode==='single'));
  $('#dest-single').classList.remove('hidden'); $('#dest-bulk').classList.add('hidden');
  const c = CONTACTS.find(x=>x.num===fmtNum(item.faxNum));
  if(c) selectContact(c);
  else { selContact=null; $('#c-selected').classList.add('hidden'); $('#s-manual').value = fmtNum(item.faxNum); }
  $('#s-subject').value = '【林材木店】ご連絡（' + fmtDate(item.date).split(' ')[0] + ' 受信FAXの件）';
  updateDestPreview();
  switchTab('send');
  toast('宛先をセットしました。件名・本文を入力してください');
  window.scrollTo({top:0, behavior:'smooth'});
}
function reuseSent(item){
  sendMode='single';
  document.querySelectorAll('.seg div').forEach(x=>x.classList.toggle('on', x.dataset.mode==='single'));
  $('#dest-single').classList.remove('hidden'); $('#dest-bulk').classList.add('hidden');
  const c = CONTACTS.find(x=>x.num===fmtNum(item.faxNum));
  if(c) selectContact(c); else { selContact=null; $('#c-selected').classList.add('hidden'); $('#s-manual').value = fmtNum(item.faxNum); }
  $('#s-subject').value = item.subject||'';
  $('#s-body').value = item.body||'';
  updateDestPreview();
  switchTab('send');
  toast('内容をセットしました（添付は付け直してください）');
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ==== 取引先追加 ==== */
$('#btn-addcontact').onclick = ()=>{
  $('#nc-genre').innerHTML = `<option value="">未設定</option>` + GENRES.map(g=>`<option>${g}</option>`).join('');
  $('#contact-ov').classList.add('show');
};
$('#nc-cancel').onclick = ()=>$('#contact-ov').classList.remove('show');
$('#nc-ok').onclick = async ()=>{
  const name = $('#nc-name').value.trim(), num = $('#nc-num').value.trim();
  if(!name || !num){ toast('名前と番号を入力してください'); return; }
  const r = await apiPost({action:'contact', name, num, genre:$('#nc-genre').value});
  if(r.ok){
    toast('登録しました: ' + name);
    $('#contact-ov').classList.remove('show');
    $('#nc-name').value=''; $('#nc-num').value='';
    const c = await apiGet('contacts'); if(c.ok) CONTACTS = c.contacts;
  } else toast(r.error||'登録できませんでした', 4000);
};

/* ==== 受信（サムネイルグリッド） ==== */
const INBOX_STATUSES = ['未対応','要返信','返信済','対応済'];
function pillClass(st){
  if(st==='未対応') return 'p-red';
  if(st==='要返信') return 'p-orange';
  if(st==='返信済') return 'p-blue';
  if(st==='対応済') return 'p-green';
  return 'p-gray';
}
function renderInboxFilters(){
  const counts = {all: INBOX.length};
  INBOX_STATUSES.forEach(s=>counts[s]=INBOX.filter(r=>r.status===s).length);
  $('#inbox-filters').innerHTML =
    INBOX_STATUSES.map(s=>`<span class="fchip ${inboxFilter===s?'on':''}" data-f="${s}">${s} ${counts[s]}</span>`).join('') +
    `<span class="fchip ${inboxFilter==='all'?'on':''}" data-f="all">すべて ${counts.all}</span>`;
  document.querySelectorAll('#inbox-filters .fchip').forEach(el=>{
    el.onclick = ()=>{ inboxFilter = el.dataset.f; renderInbox(); };
  });
  const pending = (counts['未対応']||0) + (counts['要返信']||0);
  const b = $('#inbox-badge');
  if(pending>0){ b.textContent = pending; b.style.display='inline-block'; } else b.style.display='none';
}
function thumbHolder(id, pillHtml, pagesHtml){
  return `<div class="gthumb" data-pdf="${esc(id)}">
    <div class="ph"><span class="spin dark"></span></div>
    ${pillHtml}${pagesHtml}
  </div>`;
}
function renderInbox(){
  renderInboxFilters();
  const rows = INBOX.filter(r=>inboxFilter==='all' || r.status===inboxFilter);
  if(!rows.length){ $('#inbox-list').innerHTML = '<div class="empty">該当する受信FAXはありません</div>'; return; }
  $('#inbox-list').innerHTML = `<div class="grid">` + rows.map(r=>`
    <div class="gcard" data-id="${esc(r.msgId)}">
      ${thumbHolder(r.msgId, `<span class="gpill pill ${pillClass(r.status)}">${esc(r.status)}</span>`, r.pages?`<span class="gpages">${r.pages}枚</span>`:'')}
      <div class="ginfo">
        <span class="gvendor">${esc(r.vendor || '不明 '+fmtNum(r.faxNum))}</span>
        <span class="gmeta">${fmtDate(r.date)}｜${esc(fmtNum(r.faxNum))}</span>
        <div class="gact">
          <select data-act="status" data-id="${esc(r.msgId)}">${INBOX_STATUSES.map(s=>`<option ${s===r.status?'selected':''}>${s}</option>`).join('')}</select>
          <button class="abtn" data-act="reply" data-id="${esc(r.msgId)}">↩️</button>
        </div>
      </div>
    </div>`).join('') + `</div>`;
  document.querySelectorAll('#inbox-list .gthumb').forEach(el=>{
    thumbObserver.observe(el);
    el.onclick = ()=>{
      const card = el.closest('.gcard');
      const r = INBOX.find(x=>x.msgId===card.dataset.id);
      if(r) openViewer('inbox', r);
    };
  });
  document.querySelectorAll('#inbox-list [data-act="status"]').forEach(el=>{
    el.onchange = async ()=>{
      const r = INBOX.find(x=>x.msgId===el.dataset.id); if(!r) return;
      r.status = el.value; renderInbox();
      const res = await apiPost({action:'status', msgId: el.dataset.id, status: el.value});
      if(!res.ok) toast('保存に失敗しました');
      else if(res.filed && res.filed.moved && res.filed.moved.length) toast('📁 ' + [...new Set(res.filed.moved.map(m=>m.dest))].join('・') + ' へ移動しました', 3500);
    };
  });
  document.querySelectorAll('#inbox-list [data-act="reply"]').forEach(el=>{
    el.onclick = e=>{ e.stopPropagation(); const r = INBOX.find(x=>x.msgId===el.dataset.id); if(r) prefillReply(r); };
  });
}

/* ==== 履歴（サムネイルグリッド） ==== */
function sentPillClass(st){
  st = String(st||'');
  if(st.includes('完了')) return 'p-green';
  if(st.includes('失敗')) return 'p-red';
  if(st.includes('送信中')) return 'p-blue';
  return 'p-gray';
}
function renderSent(){
  if(!SENT.length){ $('#history-list').innerHTML = '<div class="empty">送信履歴はまだありません</div>'; return; }
  $('#history-list').innerHTML = `<div class="grid">` + SENT.map((r,i)=>{
    const pill = `<span class="gpill pill ${sentPillClass(r.status)}">${esc(r.status||'')}</span>`;
    const thumb = r.srcMsgId
      ? thumbHolder(r.srcMsgId, pill, '')
      : `<div class="gthumb" data-novis="1"><div class="ph"><span class="big">${r.subject?'📝':'📠'}</span><span>${r.subject?'送付状のみ／原稿なし':'eFaxサイトから送信'}</span></div>${pill}</div>`;
    return `
    <div class="gcard" data-i="${i}">
      ${thumb}
      <div class="ginfo">
        <span class="gvendor">${esc(r.vendor || fmtNum(r.faxNum))}</span>
        <span class="gmeta">${fmtDate(r.date)}｜${esc(fmtNum(r.faxNum))}</span>
        ${r.subject?`<span class="gsub">${esc(r.subject)}</span>`:''}
      </div>
    </div>`;
  }).join('') + `</div>`;
  document.querySelectorAll('#history-list .gthumb[data-pdf]').forEach(el=>thumbObserver.observe(el));
  document.querySelectorAll('#history-list .gcard').forEach(el=>{
    el.onclick = ()=>{ const r = SENT[Number(el.dataset.i)]; if(r) openViewer('sent', r); };
  });
}

/* ==== タブ・読み込み ==== */
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===name));
  ['send','inbox','history'].forEach(n=>$('#tab-'+n).classList.toggle('hidden', n!==name));
  if(name==='inbox'){ if(INBOX._loaded) renderInbox(); else loadInbox(); }
  if(name==='history'){ if(SENT._loaded) renderSent(); else loadSent(); }
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));

async function loadInbox(){
  try{
    const r = await apiGet('inbox');
    if(r.ok){
      INBOX = r.rows; INBOX._loaded = true;
      try{ localStorage.setItem('fd_inbox', JSON.stringify(r.rows.slice(0,120))); }catch(_){}
      if(!$('#tab-inbox').classList.contains('hidden')) renderInbox(); else renderInboxFilters();
    }
    else toast('受信の取得に失敗: ' + (r.error||''));
  }catch(err){ toast('通信エラー（受信）'); }
}
async function loadSent(){
  try{
    const r = await apiGet('sent');
    if(r.ok){
      SENT = r.rows; SENT._loaded = true;
      try{ localStorage.setItem('fd_sent', JSON.stringify(r.rows.slice(0,120))); }catch(_){}
      if(!$('#tab-history').classList.contains('hidden')) renderSent();
    }
    else toast('履歴の取得に失敗: ' + (r.error||''));
  }catch(err){ toast('通信エラー（履歴）'); }
}
$('#btn-refresh').onclick = ()=>{ toast('最新を取得中…'); loadInbox(); loadSent(); };

async function boot(){
  // 前回取得分を即表示（裏で最新を取得して置き換え）
  try{
    const ci = JSON.parse(localStorage.getItem('fd_inbox')||'null');
    if(ci && ci.length){ INBOX = ci; INBOX._loaded = true; renderInboxFilters(); }
    const cs = JSON.parse(localStorage.getItem('fd_sent')||'null');
    if(cs && cs.length){ SENT = cs; SENT._loaded = true; }
  }catch(_){}
  if(!CONTACTS.length){ const c = await apiGet('contacts').catch(()=>null); if(c && c.ok) CONTACTS = c.contacts; }
  loadInbox();
  loadSent();
  if(!window._auto){
    window._auto = setInterval(()=>{ if(!document.hidden){ loadInbox(); loadSent(); } }, 180000);
    document.addEventListener('visibilitychange', ()=>{ if(!document.hidden){ loadInbox(); loadSent(); } });
  }
}

/* ==== 起動 ==== */
(async function(){
  if(CRED && CRED.email){
    $('#gate').classList.add('hidden');
    const ok = await tryLogin(CRED.email, CRED.pass);
    if(ok) boot();
    else { localStorage.removeItem(LSK); $('#gate').classList.remove('hidden'); }
  }
})();
</script>
